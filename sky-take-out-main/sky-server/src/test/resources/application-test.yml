server:
  port: 8080

  spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console


mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity

logging:
  level:
    com.sky.mapper: DEBUG