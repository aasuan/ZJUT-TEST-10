# 集成测试专用配置（H2 替代 MySQL）
spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:m8/data-*.sql
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:integration;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6380
      password: sky_test_123

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    admin-secret-key: itcast
    admin-ttl: 7200000
    admin-token-name: token
    user-secret-key: itcast
    user-ttl: 7200000
    user-token-name: authentication
  wechat:
    appid: test-appid
    secret: test-secret
